# Workflow Execution Engine
# Authoritative source for how the LLM interprets and executes workflows.
# The LLM reads these patterns directly - no traditional runtime needed.

schema_version: "4.0"
category: execution

execution:

  # ==========================================================================
  # 3-Phase Execution Model
  # ==========================================================================

  traversal:
    description:
      brief: Core workflow execution loop
      detail: |
        Executes workflows in 3 phases: Initialize, Execute, Complete.
        LLM-native model: the LLM interprets these patterns directly,
        enabling extensibility through type definitions rather than engine changes.

    phases:
      - id: initialize
        description: Load workflow, resolve types, initialize state, check entry preconditions.
        effect: |
          FUNCTION initialize(workflow_path, runtime_flags):
              workflow = parse_yaml(read_file(workflow_path))
              types = load_types(workflow.definitions)
              validate_schema(workflow)

              # Check entry preconditions
              FOR each precondition IN workflow.entry_preconditions:
                  IF NOT evaluate_precondition(precondition, types, {}):
                      DISPLAY precondition.error_message OR "Precondition failed"
                      STOP

              # Initialize state
              state = {
                  current_node: workflow.start_node,
                  previous_node: null,
                  history: [],
                  user_responses: {},
                  computed: {},
                  flags: copy(workflow.initial_state.flags OR {}),
                  checkpoints: {},
                  log: null,
                  ...workflow.initial_state
              }

              # Apply output config: defaults < skill config < runtime flags
              state.output = resolve_output_config(workflow, runtime_flags)

              RETURN { workflow, types, state }

      - id: execute
        description: Main loop. Process nodes sequentially until an ending is reached.
        effect: |
          FUNCTION execute(workflow, types, state):
              LOOP:
                  # Multi-turn resume: if paused waiting for user input, resume
                  IF state.awaiting_input:
                      state.awaiting_input.user_input = get_user_input()
                      state.current_node = state.awaiting_input.node_id

                  node = workflow.nodes[state.current_node]

                  # Check for ending
                  IF state.current_node IN workflow.endings:
                      GOTO Phase 3

                  # Dispatch node
                  outcome = dispatch_node(node, types, state)

                  # Pause if node awaits user input (multi-turn)
                  IF outcome.awaiting_input:
                      PAUSE
                      RETURN

                  # Record and advance
                  state.history.append({ node: state.current_node, outcome, timestamp: now() })
                  state.previous_node = state.current_node
                  state.current_node = outcome.next_node
              UNTIL ending

      - id: complete
        description: Display ending message, return result.
        effect: |
          FUNCTION complete(ending, state):
              message = interpolate(ending.message, state)
              DISPLAY message

              IF ending.summary:
                  FOR each key, value IN ending.summary:
                      DISPLAY "  {key}: {interpolate(value, state)}"

              RETURN ending.type

  # ==========================================================================
  # Node Dispatch
  # ==========================================================================

  dispatch:
    description:
      brief: Route execution to the appropriate node handler
      detail: |
        Each node type has execution semantics defined in nodes/workflow_nodes.yaml.
        dispatch_node resolves the node type and delegates.
    effect: |
      FUNCTION dispatch_node(node, types, state):
          SWITCH node.type:
              CASE "action":      RETURN execute_action_node(node, types, state)
              CASE "conditional":  RETURN execute_conditional_node(node, types, state)
              CASE "user_prompt":  RETURN execute_user_prompt_node(node, types, state)
              CASE "reference":    RETURN execute_reference_node(node, types, state)
              DEFAULT:             THROW "Unknown node type: {node.type}"

  # ==========================================================================
  # Precondition Dispatch
  # ==========================================================================

  precondition_dispatch:
    description:
      brief: Type-driven precondition evaluation
      detail: |
        Preconditions are pure boolean evaluations that do not modify state.
        Used in conditional nodes and entry checks. Supports ${...} interpolation
        in parameters. Composite preconditions combine conditions with logical
        operators (all, any, none, xor).

        Fully type-driven: the engine resolves the type definition and interprets
        its evaluation.effect pseudocode. New precondition types work automatically
        without engine changes.

    evaluation:
      effect: |
        FUNCTION evaluate_precondition(precondition, types, state):
            type_def = types.preconditions[precondition.type]
            IF type_def == null:
                THROW "Unknown precondition type: {precondition.type}"

            params = interpolate_params(precondition, type_def, state)
            RETURN evaluate_from_definition(type_def, params, state)

  # ==========================================================================
  # Consequence Dispatch
  # ==========================================================================

  consequence_dispatch:
    description:
      brief: Type-based consequence execution
      detail: |
        Consequences modify state, call tools, compute values, or produce side effects.
        Each consequence type maps to a definition in the TypeRegistry. The dispatch
        algorithm resolves the type, interpolates parameters, checks requirements,
        and routes by payload.kind. Results can be stored via store_as.

    dispatch:
      effect: |
        FUNCTION execute_consequence(consequence, types, state):
            type_def = types.consequences[consequence.type]
            IF type_def == null:
                THROW "Unknown consequence type: {consequence.type}"

            IF type_def.payload.requires:
                check_requirements(type_def.payload.requires)

            params = interpolate_params(consequence, type_def, state)

            SWITCH type_def.payload.kind:
                CASE "state_mutation":
                    # Apply effect to state (set_flag, mutate_state, etc.)
                    apply_effect(type_def.payload.effect, params, state)

                CASE "computation":
                    # Evaluate expression, store result
                    result = evaluate_expression(params.expression, state)
                    IF consequence.store_as: set_nested(state.computed, consequence.store_as, result)
                    IF consequence.set_flag: state.flags[consequence.set_flag] = result

                CASE "tool_call":
                    # Build and execute Claude tool call, capture result
                    result = CALL type_def.payload.tool with build_tool_call(type_def.payload.effect, params)
                    IF consequence.store_as: set_nested(state.computed, consequence.store_as, result)

                CASE "side_effect":
                    # Display output without modifying state
                    apply_effect(type_def.payload.effect, params, state)

                DEFAULT:
                    THROW "Unknown payload kind: {type_def.payload.kind}"

    error_handling:
      effect: |
        # In action nodes, failure skips remaining consequences and routes to on_failure
        FUNCTION execute_action_node(node, types, state):
            TRY:
                FOR each action IN node.actions:
                    execute_consequence(action, types, state)
                RETURN { success: true, next_node: node.on_success }
            CATCH error:
                RETURN { success: false, next_node: node.on_failure, error }

  # ==========================================================================
  # State Structure
  # ==========================================================================

  state:
    description:
      brief: Runtime state structure and lifecycle
      detail: |
        Mutable state shared across the entire workflow execution.
        Initialized from workflow.initial_state, persists across conversation turns.

    shape: |
      state:
        current_node: string       # Node being executed
        previous_node: string      # Last executed node
        history: []                # Array of { node, outcome, timestamp }
        user_responses: {}         # Keyed by node name: { handler_id, raw }
        computed: {}               # Results from consequences (store_as targets)
        flags: {}                  # Boolean routing flags
        checkpoints: {}            # Named state snapshots for rollback
        log: null                  # Log session (if logging enabled)
        output:                    # Resolved output config
          level: string            # silent|quiet|normal|verbose|debug
          log_enabled: boolean     # Whether to write log files

  # ==========================================================================
  # Interpolation
  # ==========================================================================

  interpolation:
    description:
      brief: Variable interpolation via ${...} syntax
      detail: |
        ${...} patterns in workflow YAML are replaced with values from state
        before execution. Supports dot notation for nested paths and bracket
        notation for array access including negative indices.
    effect: |
      FUNCTION interpolate(template, state):
          FOR each match IN template.match_all(/\$\{([^}]+)\}/):
              path = match.group(1)
              value = resolve_path(state, path)
              IF value == null: THROW "Unresolved variable: ${path}"
              template = template.replace(match.full, to_string(value))
          RETURN template

      FUNCTION resolve_path(state, path):
          # Prefix routing: computed.X, flags.X, user_responses.X, or top-level
          IF path.startsWith("computed."):       RETURN get_nested(state.computed, path[9:])
          IF path.startsWith("flags."):          RETURN state.flags[path[6:]]
          IF path.startsWith("user_responses."): RETURN get_nested(state.user_responses, path[15:])
          RETURN get_nested(state, path)

      FUNCTION get_nested(obj, path):
          FOR each part IN parse_path(path):  # Handles dots and [N] brackets
              IF obj == null: RETURN null
              IF part.is_index:
                  index = part.index < 0 ? obj.length + part.index : part.index
                  obj = obj[index]
              ELSE:
                  obj = obj[part.key]
          RETURN obj

    deep_interpolation: |
      Interpolation recurses into nested objects and arrays so that
      consequence parameters like { url: "${computed.repo_url}" }
      are resolved at all nesting levels before execution.

  # ==========================================================================
  # Dynamic Routing + Checkpoints
  # ==========================================================================

  dynamic_routing:
    description:
      brief: Routing targets support ${...} interpolation
      detail: |
        Any routing field (on_success, on_failure, branches.*) can contain
        ${...} references. Static targets are validated at load time; dynamic
        targets are validated at runtime when resolved.
    effect: |
      FUNCTION resolve_routing_target(target, state):
          IF target.includes("${"):
              resolved = interpolate(target, state)
              IF resolved == null OR resolved == "":
                  THROW "Dynamic target resolved to null: {target}"
              RETURN resolved
          RETURN target

  checkpoints:
    description:
      brief: State snapshots for rollback on failure
      detail: |
        create_checkpoint saves a deep copy of state. rollback_checkpoint
        restores state from the snapshot (except checkpoints themselves).
        Useful before risky operations like git clones or file writes.
    effect: |
      FUNCTION create_checkpoint(name, state):
          state.checkpoints[name] = deep_copy(state)

      FUNCTION rollback_checkpoint(name, state):
          IF name NOT IN state.checkpoints:
              THROW "Checkpoint not found: {name}"
          snapshot = state.checkpoints[name]
          # Restore mutable state from snapshot
          state.current_node = snapshot.current_node
          state.computed = snapshot.computed
          state.flags = snapshot.flags
          state.user_responses = snapshot.user_responses
          state.history = snapshot.history

  # ==========================================================================
  # Output Configuration
  # ==========================================================================

  output:
    description:
      brief: Simplified output configuration
      detail: |
        Controls terminal display verbosity and log file generation.
        Resolved from hardcoded defaults, overridden by skill config
        (workflow.initial_state.output), then by runtime flags.

    defaults:
      level: "normal"
      log_enabled: true

    levels:
      - silent: User prompts and final result only
      - quiet: Adds warnings
      - normal: Adds node transitions (default)
      - verbose: Adds condition evaluations, branch decisions
      - debug: Adds full state dumps and interpolation traces

    runtime_flags:
      - "--verbose, -v  -> level: verbose"
      - "--quiet, -q    -> level: quiet"
      - "--debug        -> level: debug"
      - "--no-log       -> log_enabled: false"

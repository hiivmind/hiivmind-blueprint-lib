# Unified Resolution Loader
# Consolidated loading protocol for types, workflows, and execution semantics
#
# Sections:
#   1. entrypoints      - Progressive loading queries for execution semantics
#   2. fetch_patterns    - Source parsing and fetch primitives
#   3. type_loading      - Type definition resolution
#   4. workflow_loading  - Reusable workflow resolution
#   5. execution_loading - Execution engine bootstrap

schema_version: "2.0"
category: resolution

resolution:

  # ============================================================================
  # 1. ENTRYPOINTS - Progressive loading queries
  # ============================================================================

  entrypoints:
    description: Pre-composed yq queries for progressive loading of execution semantics

    queries:
      bootstrap:
        file: resolution/loader.yaml
        yq: |
          {
            "phases": [.resolution.execution_loading.bootstrap.phases[].id],
            "required_sections": ["traversal", "state", "precondition_dispatch", "consequence_dispatch"]
          }
        expected:
          phases: ["bootstrap", "execution_semantics", "types", "initialize", "execute"]
          required_sections: ["traversal", "state", "precondition_dispatch", "consequence_dispatch"]

      traversal:
        file: execution/engine_execution.yaml
        yq: |
          {
            "phases": [.execution.traversal.phases[].id],
            "node_types": ["action", "conditional", "user_prompt", "reference"]
          }
        expected:
          phases: ["initialize", "execute", "complete"]
          node_types: ["action", "conditional", "user_prompt", "reference"]

      type_loading:
        file: resolution/loader.yaml
        yq: |
          {
            "hybrid_threshold": .resolution.type_loading.hybrid_loading.threshold,
            "strategies": ["lazy", "selective", "hybrid"]
          }
        expected:
          hybrid_threshold: 30
          strategies: ["lazy", "selective", "hybrid"]

      workflow_references:
        file: resolution/loader.yaml
        yq: |
          {
            "reference_format": .resolution.workflow_loading.reference_format.patterns.remote,
            "state_sharing": "shared"
          }
        expected:
          reference_format: "{owner}/{repo}@{version}:{workflow-name}"
          state_sharing: "shared"

      output_defaults:
        description: Hardcoded defaults (no fetch required)
        expected:
          level: "normal"
          display_enabled: true
          batch_enabled: true
          batch_threshold: 3
          use_icons: true
          log_enabled: true
          log_format: "yaml"
          log_location: ".logs/"
          ci_mode: false

    detail_queries:
      execute_phase:
        file: execution/engine_execution.yaml
        yq: '.execution.traversal.phases[] | select(.id == "execute") | .effect'
        use_when: Starting the main execution loop

      initialize_phase:
        file: execution/engine_execution.yaml
        yq: '.execution.traversal.phases[] | select(.id == "initialize") | .effect'
        use_when: Starting workflow execution

      complete_phase:
        file: execution/engine_execution.yaml
        yq: '.execution.traversal.phases[] | select(.id == "complete") | .effect'
        use_when: Reaching an ending node

      consequence_type:
        description: Look up type in index to find source file, then fetch from that file
        resolve: |
          file = registry.consequences[type_name].source_file
          # file is one of: core.yaml, intent.yaml, extensions.yaml
        yq: '.consequences.${type_name}'
        param: type_name
        use_when: Executing a consequence you haven't seen before

    verification_protocol:
      checkpoint_values:
        - field: "_semantics.bootstrap.phases"
          expected: '["bootstrap", "execution_semantics", "types", "initialize", "execute"]'
        - field: "_semantics.traversal.phases"
          expected: '["initialize", "execute", "complete"]'
        - field: "_semantics.type_loading.hybrid_threshold"
          expected: 30
        - field: "_semantics.bootstrap.required_sections | length"
          expected: 4
      why: Verification forces actual fetching - prevents LLM from "winging it" with pattern matching.

  # ============================================================================
  # 2. FETCH PATTERNS - Source parsing and fetch primitives
  # ============================================================================

  fetch_patterns:
    description: Shared source parsing and fetching primitives for all loaders
    since: "3.1.0"

    source_format:
      patterns:
        remote: "{owner}/{repo}@{version}"
        local_relative: '"./" or "./{path}"'
        local_absolute: '"/absolute/path"'
      detection:
        is_local: 'source.startsWith("./") OR source.startsWith("/")'
        is_remote: 'source.matches(/^[^\/]+\/[^@]+@.+$/)'

    parse_source:
      effect: |
        FUNCTION parse_source(source):
            IF source.startsWith("./") OR source.startsWith("/"):
                local_path = source.startsWith("./") ? resolve_relative_path(source) : source
                IF NOT directory_exists(local_path):
                    THROW "Local source path does not exist: {local_path}"
                RETURN { is_local: true, local_path, owner: null, repo: null, version: null }

            match = source.match(/^([^\/]+)\/([^@]+)@(.+)$/)
            IF NOT match:
                THROW "Invalid source format: {source}. Expected: owner/repo@version or local path"
            RETURN { is_local: false, local_path: null, owner: match[1], repo: match[2], version: match[3] }

    fetch:
      description: Unified fetch with local -> gh api -> raw URL fallback chain
      effect: |
        FUNCTION fetch(source_parts, path):
            IF source_parts.is_local:
                content = read_file("{source_parts.local_path}/{path}")
                RETURN parse_yaml(content)   # on error, throw with context

            # Remote: gh api first, raw URL fallback
            result = gh_api_fetch(source_parts, path)
            IF result.success: RETURN result.content

            result = raw_url_fetch(source_parts, path)
            IF result.success: RETURN result.content

            THROW "Failed to fetch: {source_parts.owner}/{source_parts.repo}/{path}@{source_parts.version}"

        FUNCTION gh_api_fetch(parts, path):
            # gh api repos/{owner}/{repo}/contents/{path}?ref={version} --jq '.content' | base64 -d
            RETURN { success, content: parse_yaml(stdout) }

        FUNCTION raw_url_fetch(parts, path):
            # https://raw.githubusercontent.com/{owner}/{repo}/{version}/{path}
            RETURN { success, content: parse_yaml(response) }

      method_selection:
        local: fetch_local only (error on failure)
        remote: gh_api -> raw_url fallback

  # ============================================================================
  # 3. TYPE LOADING - Type definition resolution
  # ============================================================================

  type_loading:
    description: Load type definitions from remote or local sources
    since: "2.0.0"

    version_formats:
      - "@v2.0.0 - Exact version (recommended)"
      - "@v2.0   - Latest patch in v2.0.x"
      - "@v2     - Latest minor in v2.x.x"

    loading_algorithm:
      effect: |
        FUNCTION load_types(definitions_block):
            parts = parse_source(definitions_block.source)
            consequences_index = fetch(parts, "consequences/index.yaml")
            preconditions_index = fetch(parts, "preconditions/index.yaml")
            registry = build_registry(consequences_index, preconditions_index, parts)

            IF definitions_block.extensions:
                FOR each ext IN definitions_block.extensions:
                    ext_registry = load_types({ source: ext })
                    registry = merge_registry(registry, ext_registry)
            RETURN registry

    registry_building:
      effect: |
        FUNCTION build_registry(consequences_index, preconditions_index, source_parts):
            registry = { consequences: { _index: consequences_index },
                         preconditions: { _index: preconditions_index },
                         source: source_parts }

            # Index maps each type to its source_file (e.g., core.yaml, intent.yaml, extensions.yaml)
            FOR each type_name, info IN consequences_index.types:
                registry.consequences[type_name] = {
                    category: info.category, brief: info.brief,
                    required_params: info.required_params,
                    source_file: info.source_file, loaded: false
                }
            FOR each type_name, info IN preconditions_index.types:
                registry.preconditions[type_name] = {
                    category: info.category, brief: info.brief,
                    required_params: info.required_params,
                    source_file: info.source_file, loaded: false
                }
            RETURN registry

    lazy_loading:
      description: Load definitions on first use, grouped by source file
      effect: |
        FUNCTION get_type_definition(registry, type_name, kind):
            entry = registry[kind][type_name]
            IF NOT entry: THROW "Unknown {kind} type: {type_name}"

            IF NOT entry.loaded:
                source_file = entry.source_file
                definitions = fetch(registry.source, "{kind}/" + source_file)
                # Cache all definitions from same source file
                FOR each name, def IN definitions[kind]:
                    IF name IN registry[kind] AND registry[kind][name].source_file == source_file:
                        registry[kind][name].definition = def
                        registry[kind][name].loaded = true

            RETURN entry.definition

    selective_loading:
      description: Workflow-first loading - analyze workflow, fetch only needed types via yq
      effect: |
        FUNCTION load_types_selective(definitions_block, workflow):
            parts = parse_source(definitions_block.source)
            consequences_index = fetch(parts, "consequences/index.yaml")
            preconditions_index = fetch(parts, "preconditions/index.yaml")

            needed = extract_workflow_types(workflow)
            # Validate all needed types exist in indexes; throw on unknown
            consequence_defs = fetch_selective_types(parts, needed.consequences, "consequences", consequences_index)
            precondition_defs = fetch_selective_types(parts, needed.preconditions, "preconditions", preconditions_index)

            # Build minimal registry with pre-loaded definitions
            registry = { consequences: {}, preconditions: {}, source: parts }
            FOR each type_name IN needed.consequences:
                registry.consequences[type_name] = {
                    ...consequences_index.types[type_name],
                    definition: consequence_defs[type_name], loaded: true
                }
            FOR each type_name IN needed.preconditions:
                registry.preconditions[type_name] = {
                    ...preconditions_index.types[type_name],
                    definition: precondition_defs[type_name], loaded: true
                }
            RETURN registry

        FUNCTION extract_workflow_types(workflow):
            consequences = Set(); preconditions = Set()
            # Scan entry_preconditions, all nodes (action/conditional/user_prompt/reference)
            # Recurse into composite conditions
            RETURN { consequences, preconditions }

        FUNCTION fetch_selective_types(source_parts, type_names, kind, index):
            # Group needed types by source_file
            file_groups = {}
            FOR each type_name IN type_names:
                source_file = index.types[type_name].source_file
                file_groups[source_file] = file_groups[source_file] ?? []
                file_groups[source_file].push(type_name)

            # Fetch each source file once, extract needed types via yq
            all_types = {}
            FOR each source_file, names IN file_groups:
                query = '.{kind} | with_entries(select(' + names.map(n => '.key == "'+n+'"').join(" or ") + '))'
                fetched = apply_yq(source_parts, "{kind}/" + source_file, query)
                all_types = merge(all_types, fetched)
            RETURN all_types

    hybrid_loading:
      description: Auto-select strategy based on type count
      threshold: 30
      effect: |
        FUNCTION load_types_hybrid(definitions_block, workflow):
            needed = extract_workflow_types(workflow)
            total = needed.consequences.size + needed.preconditions.size
            IF total > 30:
                RETURN load_types(definitions_block)           # lazy loading
            ELSE:
                RETURN load_types_selective(definitions_block, workflow)  # selective

    extension_loading:
      description: Load additional type sources with namespace collision handling
      merge_effect: |
        FUNCTION merge_registry(base, extension):
            # On collision: prefix with "{extension.source}:type_name"
            # Otherwise: merge directly
            RETURN merged_registry

    validation:
      effect: |
        FUNCTION validate_workflow_types(workflow, registry):
            # Check all consequence types in action nodes exist
            # Check all precondition types in conditional nodes exist
            # Recurse into composite conditions
            # On unknown type: THROW with context

    strategy_comparison: |
      | Strategy  | Upfront Cost | First Use Cost | Best For     | Fetches             |
      |-----------|-------------|----------------|--------------|---------------------|
      | Lazy      | Low (indexes) | Medium (1 file)  | >30 types  | 2 + 1-3 on use     |
      | Selective | Medium      | None (pre-loaded)  | <30 types  | 2 + 1-3 selective   |
      Note: Types are split across multiple files per kind (e.g., core.yaml, intent.yaml,
      extensions.yaml for consequences). Lazy loading fetches one file at a time on first
      use of a type from that file. Selective loading groups needed types by source file.

  # ============================================================================
  # 4. WORKFLOW LOADING - Reusable workflow resolution
  # ============================================================================

  workflow_loading:
    description: Load reusable workflows from remote or local sources
    since: "2.1.0"
    direct_file_since: "3.1.0"

    reference_format:
      patterns:
        remote: "{owner}/{repo}@{version}:{workflow-name}"
        local_indexed: '"./" or "./{path}:{workflow-name}"'
        local_file: '"./path/to/workflow.yaml" (direct file path)'
        local_absolute: '"/absolute/path:{workflow-name}" or "/absolute/path/workflow.yaml"'
      detection:
        is_local_file: '(ref.startsWith("./") OR ref.startsWith("/")) AND ref.endsWith(".yaml")'
        is_local_indexed: '(ref.startsWith("./") OR ref.startsWith("/")) AND ref.contains(":") AND NOT ref.endsWith(".yaml")'
        is_remote: 'ref.matches(/^[^\/]+\/[^@]+@[^:]+:.+$/)'

    loading_algorithm:
      effect: |
        FUNCTION load_workflow(workflow_ref):
            parts = parse_workflow_reference(workflow_ref)

            IF parts.is_local_file:
                RETURN load_workflow_direct(parts.file_path)
            ELSE IF parts.is_local_indexed:
                RETURN load_workflow_indexed(parts, is_local=true)
            ELSE:
                RETURN load_workflow_indexed(parts, is_local=false)

        FUNCTION load_workflow_direct(file_path):
            IF NOT file_exists(file_path): THROW "Workflow file not found: {file_path}"
            workflow = parse_yaml(read_file(file_path))
            validate_workflow(workflow)
            RETURN workflow

        FUNCTION load_workflow_indexed(parts, is_local):
            index = fetch(parts, "workflows/index.yaml")
            IF parts.workflow_name NOT IN index.workflows:
                THROW "Workflow not found: {parts.workflow_name}"
            workflow_path = "workflows/" + index.workflows[parts.workflow_name].path
            workflow = fetch(parts, workflow_path)
            validate_workflow(workflow)
            RETURN workflow

    reference_parsing:
      effect: |
        FUNCTION parse_workflow_reference(ref):
            IF ref.startsWith("./") OR ref.startsWith("/"):
                IF ref.endsWith(".yaml"):
                    RETURN { is_local_file: true, file_path: resolve(ref) }

                last_colon = ref.lastIndexOf(":")
                IF last_colon == -1: THROW "Invalid local reference: {ref}"
                RETURN { is_local_indexed: true, local_path: resolve(ref[:last_colon]),
                         workflow_name: ref[last_colon+1:] }

            match = ref.match(/^([^\/]+)\/([^@]+)@([^:]+):(.+)$/)
            IF NOT match: THROW "Invalid workflow reference: {ref}"
            RETURN { is_remote: true, owner: match[1], repo: match[2],
                     version: match[3], workflow_name: match[4] }

    execution:
      description: |
        Reference node execution supports inline (shared state) and spawn (isolated state)
        modes with input/output_mapping and transitions-based routing.
        See canonical definition: nodes/workflow_nodes.yaml → reference.execution.effect

    state_sharing:
      reference: "Shared state - sub-workflow reads/writes parent state directly"
      invoke_skill: "Isolated state - explicit input/output mapping"

    workflow_index_format:
      description: Structure of workflows/index.yaml
      fields:
        - version (required) - Workflow version (semver)
        - path (required) - Path relative to workflows/
        - description (required) - What the workflow does
        - depends_on - Type dependencies for validation
        - inputs (required) - Input parameters
        - outputs (required) - Output fields set by workflow

    dependency_validation:
      effect: |
        FUNCTION validate_workflow_dependencies(workflow_info, type_registry):
            # Check all depends_on.consequences exist in registry
            # Check all depends_on.preconditions exist in registry
            # On missing type: THROW with context

  # ============================================================================
  # 5. EXECUTION LOADING - Execution engine bootstrap
  # ============================================================================

  execution_loading:
    description: Bootstrap sequence and selective loading for execution semantics
    since: "2.0.0"

    bootstrap:
      description: |
        Resolves the apparent catch-22: "need execution semantics to load execution semantics."
        Minimal bootstrap is just: read workflow.yaml -> extract definitions.source -> parse_source().
        This is trivial string manipulation. Then fetch execution semantics normally.

      phases:
        - id: bootstrap
          description: Parse workflow.yaml, extract definitions.source
          produces: source_parts

        - id: execution_semantics
          description: Fetch execution/engine_execution.yaml
          produces: execution semantics (traversal, state, dispatch, output)

        - id: types
          description: Load type definitions per type_loading
          produces: TypeRegistry

        - id: initialize
          description: Initialize state, check entry preconditions
          produces: initial state

        - id: execute
          description: Begin execution loop per traversal semantics
          produces: execution results

    section_registry:
      required:
        - traversal   # execution.traversal - Core execution loop
        - state        # execution.state - State structure and management
        - precondition_dispatch  # execution.precondition_dispatch
        - consequence_dispatch   # execution.consequence_dispatch
      optional:
        - output       # execution.output - Unified logging + display (has defaults, since 2.4.0)
      deprecated:
        - display      # deprecated 2.4.0, replaced by output
        - logging      # deprecated 2.4.0, replaced by output

    loading_strategies:
      full:
        description: Fetch entire engine_execution.yaml (~2300 lines, 1 fetch)
        use_when: Gateway commands, complex skills, development/debugging

      selective:
        description: Extract specific sections via yq
        use_when: Simple skills, logging disabled, performance-critical
        minimal_set: [traversal, state, precondition_dispatch, consequence_dispatch]

      automatic:
        description: Auto-select based on workflow output configuration
        effect: |
          FUNCTION load_execution_auto(source_parts, workflow):
              needs_output = workflow.initial_state?.output != null
                             OR has_output_runtime_flags()
                             OR has_legacy_logging_display_config()

              sections = ["traversal", "state", "precondition_dispatch", "consequence_dispatch"]
              IF needs_output: sections.push("output")

              RETURN load_execution_selective(source_parts, sections)

    output_defaults:
      description: Used when output section is not explicitly loaded (no fetch required)
      values:
        level: "normal"
        display_enabled: true
        batch_enabled: true
        batch_threshold: 3
        use_icons: true
        log_enabled: true
        log_format: "yaml"
        log_location: ".logs/"
        ci_mode: false

    main_algorithm:
      effect: |
        FUNCTION load_execution_semantics(workflow_path, runtime_flags):
            # Phase 1: Minimal bootstrap
            workflow = parse_yaml(read_file(workflow_path))
            source_parts = parse_source(workflow.definitions.source)

            # Phase 2: Fetch execution semantics
            execution = load_execution_auto(source_parts, workflow)

            # Phase 3: Load type definitions
            types = load_types_hybrid(workflow.definitions, workflow)

            # Phase 4: Initialize state
            state = initialize_state(workflow, execution.state)

            # Phase 5: Check entry preconditions
            FOR each precondition IN workflow.entry_preconditions:
                result = evaluate_precondition(precondition, state, types, execution.precondition_dispatch)
                IF NOT result.satisfied:
                    THROW "Entry precondition failed: {precondition.type}"

            RETURN { workflow, execution, types, state }

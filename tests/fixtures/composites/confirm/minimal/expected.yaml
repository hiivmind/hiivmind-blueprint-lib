destroy_branch__ask:
  type: user_prompt
  prompt:
    question: "Delete the branch '${branch_name}'?"
    header: "CONFIRM"
    options:
      - { id: "yes", label: "Yes" }
      - { id: "no",  label: "No"  }
  on_response:
    "yes":
      consequences:
        - type: mutate_state
          operation: set
          field: confirmations.delete_branch_x
          value: true
      next_node: destroy_branch__gate
    "no":
      consequences:
        - type: mutate_state
          operation: set
          field: confirmations.delete_branch_x
          value: false
      next_node: destroy_branch__gate

destroy_branch__gate:
  type: conditional
  condition: "confirmations.delete_branch_x == true"
  on_true: branch_gone
  on_false: cancelled

# Execution Examples
# Documentary usage patterns for execution concepts.
# These are for human reference, not automated testing.

schema_version: "3.0"
description: |
  Example usage patterns for the execution engine.
  Covers dispatch, preconditions, state, interpolation, and checkpoints.

examples:

  # ==========================================================================
  # consequence-dispatch - Dispatch by payload.kind
  # ==========================================================================
  consequence-dispatch:
    payload_kinds:
      - title: "state_mutation - Direct state modifications"
        yaml: |
          - type: set_flag
            flag: config_loaded
            value: true

          - type: mutate_state
            operation: set
            field: source_type
            value: git
        explanation: |
          State mutations modify runtime state directly.
          The engine applies the effect defined in the type definition.

      - title: "computation - Expression evaluation"
        yaml: |
          - type: evaluate
            expression: "len(computed.sources) == 0"
            set_flag: is_first_source

          - type: compute
            expression: "computed.base_path + '/' + computed.filename"
            store_as: computed.full_path
        explanation: |
          Computations evaluate expressions and store results.

      - title: "tool_call - Claude tool invocation"
        yaml: |
          - type: git_ops_local
            operation: clone
            args:
              url: "https://github.com/org/repo"
              dest: ".source/repo"

          - type: local_file_ops
            operation: read
            path: "config.yaml"
            store_as: config_content
        explanation: |
          Tool calls invoke Claude Code tools (Bash, Read, Write, etc.).
          Results are captured and stored in state.

      - title: "composite - Multiple sub-consequences"
        yaml: |
          - type: init_log
            workflow_name: add-source
            skill_name: hiivmind-corpus-add-source
        explanation: |
          Composite consequences execute multiple sub-consequences in sequence.

      - title: "side_effect - Display without state mutation"
        yaml: |
          - type: display
            format: text
            content: "Processing ${computed.source_id}..."

          - type: display
            format: table
            title: "Sources"
            headers: [ID, Type]
            content: "${computed.sources_table}"
        explanation: |
          Side effects produce output but do not modify state.

    parameter_interpolation:
      - title: "String interpolation"
        yaml: |
          - type: display
            format: text
            content: "Cloning ${computed.repo_url} to ${computed.clone_path}"
        explanation: |
          ${...} patterns are replaced with state values before execution.

      - title: "Nested object interpolation"
        yaml: |
          - type: mutate_state
            operation: merge
            field: computed.config
            value:
              url: "${computed.repo_url}"
              name: "${user_responses.ask_name.text}"
        explanation: |
          Interpolation works recursively in nested objects.

  # ==========================================================================
  # precondition-dispatch - Type-based precondition evaluation
  # ==========================================================================
  precondition-dispatch:
    type_categories:
      - title: "Filesystem preconditions"
        yaml: |
          condition:
            type: path_check
            path: "data/config.yaml"
            check: is_file
        explanation: |
          Check file and directory existence via path_check.

      - title: "State preconditions"
        yaml: |
          condition:
            type: all_of
            conditions:
              - type: state_check
                field: flags.config_loaded
                operator: "true"
              - type: state_check
                field: computed.source_id
                operator: not_null
        explanation: |
          Check state values and flags via state_check.

      - title: "Composite preconditions"
        yaml: |
          condition:
            type: any_of
            conditions:
              - type: tool_check
                tool: yq
                capability: available
              - type: tool_check
                tool: python3
                capability: available
        explanation: |
          Combine conditions with all_of, any_of, none_of, xor_of.

  # ==========================================================================
  # state - Runtime state structure
  # ==========================================================================
  state:
    structure:
      - title: "State shape during execution"
        yaml: |
          state:
            current_node: "ask_source_type"
            previous_node: "check_url_provided"
            user_responses:
              ask_source_type:
                handler_id: "git"
            computed:
              repo_url: "https://github.com/org/repo"
              source_id: "my-source"
            flags:
              config_found: true
              is_first_source: true
            checkpoints:
              before_clone: { ... }
            output:
              level: "normal"
              log_enabled: true
        explanation: |
          Full state structure maintained during workflow execution.

    interpolation:
      - title: "Variable interpolation patterns"
        yaml: |
          "${source_type}"                          # Top-level field
          "${computed.repo_url}"                    # Computed value
          "${flags.config_found}"                   # Flag
          "${user_responses.ask_type.handler_id}"   # User response
          "${computed.config.corpus.name}"          # Nested computed
          "${computed.sources[0].id}"               # Array index
          "${history[-1].node}"                     # Negative index
        explanation: |
          ${...} patterns are replaced with values from state.
          Supports dot notation, array access, and negative indices.

    dynamic_routing:
      - title: "Dynamic routing target"
        yaml: |
          execute_matched_intent:
            type: action
            actions:
              - type: dynamic_route
                action: "${computed.intent_matches.winner.action}"
            on_success: "${computed.dynamic_target}"
            on_failure: show_main_menu
        explanation: |
          Routing targets can use ${...} interpolation for
          dynamic routing based on computed state.

    checkpoints:
      - title: "Checkpoint and rollback workflow"
        yaml: |
          prepare_clone:
            type: action
            actions:
              - type: create_checkpoint
                name: "before_clone"
            on_success: execute_clone

          execute_clone:
            type: action
            actions:
              - type: git_ops_local
                operation: clone
                args:
                  url: "${computed.repo_url}"
                  dest: ".source/${computed.source_id}"
            on_success: verify_clone
            on_failure: handle_clone_failure

          handle_clone_failure:
            type: action
            actions:
              - type: rollback_checkpoint
                name: "before_clone"
              - type: display
                format: text
                content: "Clone failed, state restored"
            on_success: ask_retry
        explanation: |
          Create checkpoint before risky operation.
          Rollback on failure to restore state.

  # ==========================================================================
  # traversal - Execution phases
  # ==========================================================================
  traversal:
    phases:
      - title: "Phase 1: Initialize"
        yaml: |
          workflow = parse_yaml(read_file(workflow_path))
          types = load_types(workflow.definitions)
          validate_schema(workflow)
          check_entry_preconditions(workflow)
          state = initialize_state(workflow)
        explanation: |
          Load workflow, resolve types, initialize state.

      - title: "Phase 2: Execute"
        yaml: |
          LOOP:
            node = workflow.nodes[state.current_node]
            IF state.current_node IN workflow.endings: GOTO Phase 3
            outcome = dispatch_node(node, types, state)
            IF outcome.awaiting_input: PAUSE
            state.history.append({ node, outcome, timestamp })
            state.previous_node = state.current_node
            state.current_node = outcome.next_node
          UNTIL ending
        explanation: |
          Main execution loop. Process nodes until ending reached.

      - title: "Phase 3: Complete"
        yaml: |
          message = interpolate(ending.message, state)
          DISPLAY message
          RETURN ending.type
        explanation: |
          Display ending message and return result type.

    node_dispatch:
      - title: "Node type dispatch"
        yaml: |
          SWITCH node.type:
            CASE "action":      execute_action_node(node, types, state)
            CASE "conditional":  execute_conditional_node(node, types, state)
            CASE "user_prompt":  execute_user_prompt_node(node, types, state)
            CASE "reference":    execute_reference_node(node, types, state)
        explanation: |
          Routes to handler based on node.type.

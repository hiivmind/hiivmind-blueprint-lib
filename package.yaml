# Blueprint Types Library Package Manifest
# Semantic type definitions and reusable workflows for hiivmind-blueprint

name: hiivmind-blueprint-lib
version: "6.1.0"
description: |
  Type definition catalog for hiivmind-blueprint.
  Provides 22 consequence types (13 core + 3 intent + 6 extensions),
  9 precondition types (3 core + 6 extensions), 3 node types, and
  1 reusable workflow.

  Types are deployed locally via .hiivmind/blueprint/definitions.yaml
  (no remote loading required).

repository: https://github.com/hiivmind/hiivmind-blueprint-lib
license: MIT

# Schema versions for each type system
schemas:
  consequence: "2.0"
  precondition: "2.0"
  node: "2.0"
  workflow: "3.0"
  definitions: "1.0"

# Statistics
stats:
  total_types: 34
  consequence_types: 22
  precondition_types: 9
  node_types: 3
  workflows: 1

# Artifacts produced by releases
artifacts:
  - consequences/ # Type definitions (core.yaml, intent.yaml, extensions.yaml)
  - preconditions/ # Type definitions (core.yaml, extensions.yaml)
  - nodes/ # Node type definitions
  - workflows/ # Reusable workflow definitions
  - schema/ # JSON Schema definitions
  - examples/ # Usage examples

# Compatibility
minimum_blueprint_version: "6.1.0"

# How to use this package
usage: |
  Copy the type definitions your workflows need into your repo's
  .hiivmind/blueprint/definitions.yaml file. See the authoring guide
  in hiivmind-blueprint/patterns/authoring-guide.md for details.
